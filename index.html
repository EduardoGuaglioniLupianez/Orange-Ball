<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>OrangeBall</title>
    <link rel="stylesheet" href="estilohome.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="src/LogoOrangeBall.png" alt="Logo">
            <span>ORANGEBALL</span>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Estatísticas</a>
            <a href="#">Treinos</a>
        </nav>
        <div class="auth">
            <button class="login">Entrar</button>
            <button class="register">Criar Conta</button>
        </div>
    </header>

    <section class="hero">
        
        <h1>Melhore seu desempenho no basquete!!!</h1>
        <p>Registre seus jogos e receba feedback automático com base nas suas estatísticas.</p>
    </section>

    <section class="cards">
        <h2>Seu desempenho recente</h2>

        <div class="card-container">
            <div class="card">
                <h3>Aproveitamento</h3>
                <p class="stat">38%</p>
                <p class="bad">Abaixo do ideal</p>
            </div>

            <div class="card">
                <h3>Rebotes</h3>
                <p class="stat">4</p>
                <p class="medium">Pode melhorar</p>
            </div>

            <div class="card">
                <h3>Assistências</h3>
                <p class="stat">7</p>
                <p class="good">Bom desempenho</p>
            </div>
        </div>
    </section>

</body>

</html>
